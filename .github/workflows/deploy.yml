name: React CI/CD

on:
  push:
    branches:
      - main
      - dev
      - qa
      - uat

concurrency:
  group: react-cicd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest,windows-latest,macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    timeout-minutes: 5
    runs-on:  ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Set Build Environment
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "BUILD_ENV=production" >> $GITHUB_ENV
          else
            echo "BUILD_ENV=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # CHANGED STEP: Dynamically pass the current branch name to Vite/React build
      - name: Build project for specific environment
        run: |
          npm run build -- --mode $BUILD_ENV
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist
          retention-days: 1

  deploy:
    needs: build
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write 

    # FORCE INJECTION: This ensures the runner specifically grabs these
    env:
      ACTION_APP_ID: ${{ vars.ACTION_APP_ID }}
      ACTION_APP_PRIVATE_KEY: ${{ secrets.ACTION_APP_PRIVATE_KEY }}
      DEPLOY_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          # Now reference the values injected via the 'env' block
          client-id: ${{ env.ACTION_APP_ID }}
          private-key: ${{ env.ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: dist
          
      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "sreeraj-cicd-bot[bot]"
          git config --global user.email "sreeraj-cicd-bot[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/${GITHUB_REPOSITORY}.git
          npm run deploy
      - name: Send Microsoft Teams Notification
        if: always()
        uses: skandash/action-teams-webhook@v1.2
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK }}
          status: ${{ job.status }}
          title: "CI/CD Pipeline: ${{ job.status }}"
          text: "The automated pipeline run for the **${{ github.ref_name }}** branch has completed. View the logs on GitHub."