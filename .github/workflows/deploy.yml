name: React CI/CD

on:
  push:
    branches:
      - main
      - dev
      - qa
      - uat


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      # CHANGED STEP: Dynamically pass the current branch name to Vite/React build
      - name: Build project for specific environment
        run: |
          echo "Building the project specifically for the ${{ github.ref_name }} branch"
          npm run build -- --mode ${{ github.ref_name }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    # FORCE INJECTION: This ensures the runner specifically grabs these
    env:
      ACTION_APP_ID: ${{ vars.ACTION_APP_ID }}
      ACTION_APP_PRIVATE_KEY: ${{ secrets.ACTION_APP_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          # Now reference the values injected via the 'env' block
          client-id: ${{ env.ACTION_APP_ID }}
          private-key: ${{ env.ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          
      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "sreeraj-cicd-bot[bot]"
          git config --global user.email "sreeraj-cicd-bot[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          npm run deploy