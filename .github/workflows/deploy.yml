name: React CI/CD

on:
  push:
    branches:
      - main
      - dev
      - qa
      - uat

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Build project
        run: |
          echo "Building for branch: ${{ github.ref_name }}"
          npm run build -- --mode ${{ github.ref_name }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    env:
      ACTION_APP_ID: ${{ vars.ACTION_APP_ID }}
      ACTION_APP_PRIVATE_KEY: ${{ secrets.ACTION_APP_PRIVATE_KEY }}

    steps:
      # STEP 1: Generate the token FIRST
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ env.ACTION_APP_ID }}
          private-key: ${{ env.ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # STEP 2: Checkout the code USING the generated token
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # This tells checkout to configure Git using your secure App Token
          token: ${{ steps.app-token.outputs.token }}

      # STEP 3: Setup your environment
      - name: Setup Environment
        uses: ./.github/actions/setup-env 
          
      # STEP 4: Deploy
      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "sreeraj-cicd-bot[bot]"
          git config --global user.email "sreeraj-cicd-bot[bot]@users.noreply.github.com"
          # No environment variables or messy URL overrides needed here anymore!
          # Git is already fully authenticated from Step 2.
          npm run deploy