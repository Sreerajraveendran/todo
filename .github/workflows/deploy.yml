name: React CI/CD

on:
  push:
    branches:
      - main
      - dev
      - qa
      - uat

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Build project
        run: |
          echo "Building for branch: ${{ github.ref_name }}"
          npm run build -- --mode ${{ github.ref_name }}

  deploy:
    needs: build
    # Deploy only from main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    env:
      ACTION_APP_ID: ${{ vars.ACTION_APP_ID }}
      ACTION_APP_PRIVATE_KEY: ${{ secrets.ACTION_APP_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ env.ACTION_APP_ID }}
          private-key: ${{ env.ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          
      - name: Deploy to GitHub Pages
        env:
          # gh-pages automatically uses GITHUB_TOKEN for auth
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "sreeraj-cicd-bot[bot]"
          git config --global user.email "sreeraj-cicd-bot[bot]@users.noreply.github.com"
          npm run deploy