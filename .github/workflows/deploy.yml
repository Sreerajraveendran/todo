name: React CI/CD

on:
  push:
    branches:
      - main
      - dev
      - qa
      - uat


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      # CHANGED STEP: Dynamically pass the current branch name to Vite/React build
      - name: Build project for specific environment
        run: |
          echo "Building the project specifically for the ${{ github.ref_name }} branch"
          npm run build -- --mode ${{ github.ref_name }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env 

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.ACTION_APP_ID }}
          private-key: ${{ secrets.ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Deploy to GitHub Pages
        # Industry standard: Reference the token directly from the step output
        # to ensure it is never inadvertently exposed via global env vars.
        run: |
          git config --global user.name "sreeraj-cicd-bot[bot]"
          git config --global user.email "sreeraj-cicd-bot[bot]@users.noreply.github.com"
          
          # Use the token directly from the 'app-token' step's output
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          
          npm run deploy