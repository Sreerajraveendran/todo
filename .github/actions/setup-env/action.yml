name: 'Setup Node Environment'
description: 'Checks out code, sets up Node, and installs dependencies'

runs:
  using: "composite" # This tells GitHub it's a reusable block of steps
  steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      shell: bash # CRITICAL: Composite actions require you to specify the shell